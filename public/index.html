<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakouts â Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   BREAKOUTS BY CLAUDE & DEADSHOT â Design System
   Colors: Dark grey bg, Light blue accents, Green/Red sentiment
   ============================================================================ */
:root {
  /* TRUE dark grey â no purple tint */
  --bg-primary: #1c1c1c;
  --bg-secondary: #161616;
  --bg-card: #242424;
  --bg-card-hover: #2c2c2c;
  --bg-surface: rgba(255,255,255,0.02);

  --accent: #4fc3f7;
  --accent-dim: rgba(79,195,247,0.15);
  --accent-glow: rgba(79,195,247,0.25);

  /* Stronger green for bullish */
  --green: #00e676;
  --green-bg: rgba(0,230,118,0.15);
  --green-border: rgba(0,230,118,0.45);
  --green-glow: rgba(0,230,118,0.3);

  /* Stronger red for bearish */
  --red: #ff5252;
  --red-bg: rgba(255,82,82,0.15);
  --red-border: rgba(255,82,82,0.45);
  --red-glow: rgba(255,82,82,0.3);

  --text-primary: #e8e8e8;
  --text-secondary: #999999;
  --text-dim: #666666;
  --text-muted: #444444;

  --border: rgba(255,255,255,0.08);
  --border-accent: rgba(79,195,247,0.2);

  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --font-sans: 'Inter', -apple-system, sans-serif;

  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-secondary); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes glow { 0%,100%{box-shadow:0 0 8px var(--accent-glow)} 50%{box-shadow:0 0 20px var(--accent-glow)} }

.mono { font-family: var(--font-mono); }

/* ============================================================================
   HEADER
   ============================================================================ */
.header {
  padding: 14px 28px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(28,28,28,0.95), var(--bg-primary));
}
.header-left { display: flex; align-items: center; gap: 14px; }

.live-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 12px var(--green-glow);
  animation: pulse 2s ease-in-out infinite;
}
.dead-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 12px var(--red-glow);
  animation: pulse 1s ease-in-out infinite;
}

.brand {
  font-size: 20px; font-weight: 900; letter-spacing: 0.06em;
  color: var(--accent);
}
.brand-sub {
  font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em;
  margin-top: 1px;
}

.nav { display: flex; gap: 4px; }
.nav-btn {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  padding: 7px 16px; border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent; color: var(--text-secondary);
  cursor: pointer; transition: all 0.2s;
}
.nav-btn:hover { background: var(--bg-surface); color: var(--text-primary); }
.nav-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--border-accent);
}

.header-right { display: flex; align-items: center; gap: 20px; }
.clock {
  font-size: 20px; font-weight: 700; color: var(--accent);
  letter-spacing: 0.04em;
}
.market-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: var(--radius-sm);
}
.market-open { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }
.market-closed { color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }

/* ============================================================================
   STATS BAR
   ============================================================================ */
.stats-bar {
  padding: 10px 28px;
  display: flex; align-items: center; gap: 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
.stat { display: flex; align-items: center; gap: 7px; }
.stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }
.stat-value { font-size: 15px; font-weight: 800; }
.divider { width: 1px; height: 18px; background: var(--border); }

/* ============================================================================
   MAIN 2-COLUMN LAYOUT
   ============================================================================ */
.terminal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: calc(100vh - 140px);
}

.column {
  padding: 20px;
  overflow-y: auto;
}
.column:first-child {
  border-right: 1px solid var(--border);
}

.column-header {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.column-count {
  font-size: 20px; font-weight: 800; color: var(--accent);
}

/* ============================================================================
   STOCK CARDS â Key Levels (Column 1)
   ============================================================================ */
.stock-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.stock-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-accent);
}

.stock-card.bullish {
  border-left: 4px solid var(--green);
  background: linear-gradient(90deg, rgba(0,230,118,0.1), var(--bg-card));
  box-shadow: inset 0 0 30px rgba(0,230,118,0.04);
}
.stock-card.bearish {
  border-left: 4px solid var(--red);
  background: linear-gradient(90deg, rgba(255,82,82,0.1), var(--bg-card));
  box-shadow: inset 0 0 30px rgba(255,82,82,0.04);
}

.card-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 12px;
}

.ticker-name {
  font-size: 22px; font-weight: 900; letter-spacing: 0.04em;
  color: var(--text-primary);
}

.card-price {
  text-align: right;
}
.price-big {
  font-size: 22px; font-weight: 800;
  transition: color 0.15s;
}
.price-up { color: var(--green); }
.price-down { color: var(--red); }
.price-flat { color: var(--text-primary); }

.change-text {
  font-size: 12px; font-weight: 600; margin-top: 2px;
}

/* Sentiment pill (replaces text bull/bear) */
.sentiment-pill {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
}
.sentiment-pill.bullish { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.sentiment-pill.bearish { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }

/* Level rows inside a card */
.level-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  font-size: 13px;
}
.level-row:last-child { border-bottom: none; }

.level-label {
  color: var(--text-secondary);
  font-size: 11px; font-weight: 500;
  min-width: 90px;
}
.level-price {
  font-weight: 700; font-size: 15px;
  color: var(--text-primary);
}
.level-distance {
  font-size: 10px;
  color: var(--text-dim);
  min-width: 50px;
  text-align: right;
}

/* ============================================================================
   STOCK CARDS â Breakout/Consolidation (Column 2)
   ============================================================================ */
.breakout-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: all 0.2s;
}

.breakout-card.bullish {
  background: linear-gradient(135deg, rgba(0,230,118,0.12), var(--bg-card));
  border-color: var(--green-border);
  box-shadow: inset 0 0 30px rgba(0,230,118,0.05), 0 0 12px rgba(0,230,118,0.08);
}
.breakout-card.bearish {
  background: linear-gradient(135deg, rgba(255,82,82,0.12), var(--bg-card));
  border-color: var(--red-border);
  box-shadow: inset 0 0 30px rgba(255,82,82,0.05), 0 0 12px rgba(255,82,82,0.08);
}
.breakout-card.neutral {
  border-color: var(--border);
}

.breakout-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}

.prob-badge {
  font-size: 16px; font-weight: 800;
  padding: 4px 12px; border-radius: var(--radius-sm);
  display: inline-block;
}
.prob-high {
  color: var(--green); background: var(--green-bg);
  border: 1px solid var(--green-border);
  box-shadow: 0 0 12px var(--green-glow);
}
.prob-mid {
  color: #ffd740; background: rgba(255,215,64,0.08);
  border: 1px solid rgba(255,215,64,0.2);
}
.prob-low {
  color: var(--text-dim); background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
}

.trend-text {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.5;
  margin-top: 6px;
}

.signal-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 10px;
}
.signal-chip {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.signal-chip.active-bull { color: var(--green); border-color: var(--green-border); background: var(--green-bg); }
.signal-chip.active-bear { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }

/* ============================================================================
   STOCK MANAGEMENT PAGE
   ============================================================================ */
.manage-page { display: none; padding: 28px; max-width: 800px; margin: 0 auto; }
.manage-page.active { display: block; }

.add-form {
  display: flex; gap: 10px; margin-bottom: 24px;
}
.add-input {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 16px; font-weight: 700;
  padding: 12px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  outline: none;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.add-input::placeholder {
  color: var(--text-muted);
  text-transform: none;
  letter-spacing: 0.02em;
}
.add-input:focus { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

.add-btn {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  padding: 12px 28px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: var(--bg-primary);
  cursor: pointer;
  transition: all 0.2s;
}
.add-btn:hover { background: #6dd5fa; transform: translateY(-1px); }

.watchlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.watchlist-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: all 0.2s;
}
.watchlist-item:hover { border-color: var(--red-border); }

.wl-ticker {
  font-size: 16px; font-weight: 800; letter-spacing: 0.04em;
}
.remove-btn {
  font-size: 18px; color: var(--text-dim);
  background: none; border: none; cursor: pointer;
  padding: 4px 8px; border-radius: 4px;
  transition: all 0.15s;
}
.remove-btn:hover { color: var(--red); background: var(--red-bg); }

/* ============================================================================
   FOOTER
   ============================================================================ */
.footer {
  padding: 10px 28px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg-surface);
}
.footer-text { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; }

/* ============================================================================
   EMPTY / LOADING STATES
   ============================================================================ */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state .msg { font-size: 13px; }

.loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div id="statusDot" class="dead-dot"></div>
      <div>
        <div class="mono brand">BREAKOUTS</div>
        <div class="mono brand-sub">BY CLAUDE & DEADSHOT</div>
      </div>
      <div class="nav">
        <button class="nav-btn active" data-page="terminal" onclick="switchPage('terminal')">TERMINAL</button>
        <button class="nav-btn" data-page="manage" onclick="switchPage('manage')">STOCKS</button>
      </div>
    </div>
    <div class="header-right">
      <span id="marketBadge" class="mono market-badge market-closed">CONNECTING...</span>
      <div style="text-align:right">
        <div id="clock" class="mono clock">--:--:--</div>
        <div class="mono" style="font-size:10px;color:var(--text-muted)">
          <span id="tickInfo">CONNECTING</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <span class="mono stat-label">BREAKOUTS</span>
      <span id="breakoutCount" class="mono stat-value" style="color:var(--text-muted)">0</span>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <span class="mono stat-label">CONSOLIDATING</span>
      <span id="consolCount" class="mono stat-value" style="color:var(--text-dim)">0</span>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <span class="mono stat-label">TRENDING</span>
      <span id="trendCount" class="mono stat-value" style="color:var(--accent)">0</span>
    </div>
    <div class="divider"></div>
    <div id="activeBreakouts" style="display:flex;gap:10px;align-items:center"></div>
  </div>

  <!-- ================================================================
       TERMINAL PAGE â 2 Column Layout
       ================================================================ -->
  <div id="terminalPage" class="terminal-grid">
    <!-- Column 1: Key Levels -->
    <div class="column" id="keyLevelsColumn">
      <div class="column-header">
        <span class="mono">KEY LEVELS</span>
        <span class="mono column-count" id="levelCount">0</span>
      </div>
      <div id="keyLevelsBody">
        <div class="empty-state loading">
          <div class="icon">&#9673;</div>
          <div class="msg mono">Loading levels...</div>
        </div>
      </div>
    </div>

    <!-- Column 2: Breakout / Consolidation -->
    <div class="column" id="breakoutColumn">
      <div class="column-header">
        <span class="mono">BREAKOUT / CONSOLIDATION</span>
        <span class="mono column-count" id="breakoutColCount">0</span>
      </div>
      <div id="breakoutBody">
        <div class="empty-state loading">
          <div class="icon">&#9651;</div>
          <div class="msg mono">Scanning for breakouts...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================================================================
       STOCK MANAGEMENT PAGE
       ================================================================ -->
  <div id="managePage" class="manage-page">
    <div class="column-header">
      <span class="mono">MANAGE WATCHLIST</span>
      <span class="mono column-count" id="wlCount">0</span>
    </div>

    <div class="add-form">
      <input type="text" id="addTickerInput" class="add-input mono" placeholder="Enter ticker symbol (e.g. AAPL)" maxlength="10" />
      <button class="add-btn mono" onclick="addTicker()">+ ADD</button>
    </div>

    <div id="watchlistGrid" class="watchlist-grid"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="mono footer-text">ALPACA SIP DATA â¢ REAL-TIME â¢ SCALPBREAKOUTS.COM</span>
    <span class="mono footer-text" id="lastUpdate">â</span>
  </div>
</div>

<script>
// ============================================================================
// BREAKOUTS TERMINAL â Frontend
// ============================================================================

// API base URL â change this to your Railway backend URL in production
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : (window.API_BASE || 'https://breakouts-backend-production.up.railway.app');

let tickCount = 0;
let currentPage = 'terminal';
let lastKeyLevelsHTML = '';
let lastBreakoutsHTML = '';

// ============================================================================
// PAGE NAVIGATION
// ============================================================================
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });
  document.getElementById('terminalPage').style.display = page === 'terminal' ? 'grid' : 'none';
  document.getElementById('managePage').classList.toggle('active', page === 'manage');
  document.getElementById('statsBar').style.display = page === 'terminal' ? 'flex' : 'none';

  if (page === 'manage') loadWatchlist();
}

// ============================================================================
// FETCH TERMINAL DATA
// ============================================================================
async function fetchTerminal() {
  try {
    const res = await fetch(`${API_BASE}/api/terminal`);
    const data = await res.json();

    tickCount++;
    document.getElementById('statusDot').className = 'live-dot';

    // Market status
    const badge = document.getElementById('marketBadge');
    if (data.marketOpen) {
      badge.className = 'mono market-badge market-open';
      badge.textContent = 'MARKET OPEN';
    } else {
      badge.className = 'mono market-badge market-closed';
      badge.textContent = 'MARKET CLOSED';
    }

    document.getElementById('tickInfo').textContent =
      `TICK #${tickCount} â¢ ${data.watchlist.length} SYMBOLS â¢ SIP LIVE`;

    if (data.lastUpdate) {
      document.getElementById('lastUpdate').textContent =
        `LAST: ${new Date(data.lastUpdate).toLocaleTimeString()}`;
    }

    renderKeyLevels(data.keyLevels, data.breakouts);
    renderBreakouts(data.breakouts);

  } catch (err) {
    document.getElementById('statusDot').className = 'dead-dot';
    document.getElementById('marketBadge').textContent = 'DISCONNECTED';
    document.getElementById('marketBadge').className = 'mono market-badge market-closed';
    console.error('Fetch error:', err);
  }
}

// ============================================================================
// RENDER: KEY LEVELS COLUMN
// Only shows stocks that have levels near current price (within 1.5%)
// or are in a breakout/trending phase
// ============================================================================
function renderKeyLevels(keyLevels, breakouts) {
  const body = document.getElementById('keyLevelsBody');

  // Filter: only show stocks with nearby levels (within 1.5%) or active breakout phases
  const activePhases = new Set();
  if (breakouts) {
    breakouts.forEach(b => {
      if (b.phase !== 'CONSOLIDATION' && b.phase !== 'BUILDING_DATA') {
        activePhases.add(b.ticker);
      }
    });
  }

  const filtered = (keyLevels || []).filter(stock => {
    // Always show if in breakout/trending
    if (activePhases.has(stock.ticker)) return true;
    // Show if any level is within 1.5% of current price
    const hasNearbyLevel = (stock.levels || []).some(lvl => lvl.distance <= 1.5);
    return hasNearbyLevel;
  });

  document.getElementById('levelCount').textContent = filtered.length;

  if (filtered.length === 0) {
    const emptyHTML = '<div class="empty-state"><div class="icon" style="font-size:28px;opacity:0.2">&#9673;</div><div class="msg mono" style="font-size:12px">No stocks near key levels right now<br><span style="color:var(--text-muted);font-size:10px">Stocks appear here when price approaches a key level</span></div></div>';
    if (lastKeyLevelsHTML !== emptyHTML) {
      body.innerHTML = emptyHTML;
      lastKeyLevelsHTML = emptyHTML;
    }
    return;
  }

  const newHTML = filtered.map(stock => {
    const sentimentClass = stock.sentiment === 'bullish' ? 'bullish' : 'bearish';
    const priceClass = stock.changePct >= 0 ? 'price-up' : 'price-down';
    const changeSign = stock.change >= 0 ? '+' : '';

    const topLevels = (stock.levels || []).slice(0, 5);

    const levelsHTML = topLevels.length > 0
      ? topLevels.map(lvl => `
          <div class="level-row">
            <span class="level-label">${lvl.label}</span>
            <span class="mono level-price">$${lvl.price.toFixed(2)}</span>
            <span class="mono level-distance" style="color:${lvl.sentiment === 'bullish' ? 'var(--green)' : 'var(--red)'}">
              ${lvl.distance.toFixed(1)}%
            </span>
          </div>
        `).join('')
      : '<div style="font-size:11px;color:var(--text-dim);padding:8px 0">Levels computing...</div>';

    return `
      <div class="stock-card ${sentimentClass}" data-ticker="${stock.ticker}">
        <div class="card-top">
          <div>
            <span class="sentiment-pill ${sentimentClass}"></span>
            <span class="mono ticker-name">${stock.ticker}</span>
          </div>
          <div class="card-price">
            <div class="mono price-big ${priceClass}">$${stock.currentPrice.toFixed(2)}</div>
            <div class="mono change-text" style="color:${stock.changePct >= 0 ? 'var(--green)' : 'var(--red)'}">
              ${changeSign}${stock.change.toFixed(2)} (${stock.changePct.toFixed(2)}%)
            </div>
          </div>
        </div>
        ${levelsHTML}
      </div>
    `;
  }).join('');

  // Only update DOM if content actually changed (prevents flashing)
  if (newHTML !== lastKeyLevelsHTML) {
    body.innerHTML = newHTML;
    lastKeyLevelsHTML = newHTML;
  }
}

// ============================================================================
// RENDER: BREAKOUT / CONSOLIDATION COLUMN
// Only shows stocks with active signals (breakout, trending, or prob > 40%)
// Consolidating/building stocks are hidden from the board
// ============================================================================
function renderBreakouts(breakouts) {
  const body = document.getElementById('breakoutBody');

  if (!breakouts || breakouts.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="msg mono">No stocks in watchlist</div></div>';
    return;
  }

  // Count ALL phases for stats bar
  let breakoutCount = 0, consolCount = 0, trendCount = 0;
  const activeBreakoutTickers = [];

  breakouts.forEach(b => {
    if (b.phase === 'BREAKOUT_UP' || b.phase === 'BREAKOUT_DOWN') {
      breakoutCount++;
      activeBreakoutTickers.push(b);
    }
    else if (b.phase === 'CONSOLIDATION' || b.phase === 'BUILDING_DATA') consolCount++;
    else if (b.phase === 'TRENDING_UP' || b.phase === 'TRENDING_DOWN') trendCount++;
  });

  // Update stats bar (always shows full counts)
  const bcEl = document.getElementById('breakoutCount');
  bcEl.textContent = breakoutCount;
  bcEl.style.color = breakoutCount > 0 ? 'var(--green)' : 'var(--text-muted)';

  document.getElementById('consolCount').textContent = consolCount;
  document.getElementById('trendCount').textContent = trendCount;

  document.getElementById('activeBreakouts').innerHTML = activeBreakoutTickers.map(b => `
    <span class="mono" style="font-size:12px;font-weight:800;color:${b.isBullish ? 'var(--green)' : 'var(--red)'};animation:pulse 1.5s ease-in-out infinite">
      ${b.ticker} ${b.isBullish ? '&#9650;' : '&#9660;'}
    </span>
  `).join('');

  // FILTER: Only show stocks with active signals on the board
  const activeBreakouts = breakouts.filter(b =>
    b.phase === 'BREAKOUT_UP' ||
    b.phase === 'BREAKOUT_DOWN' ||
    b.phase === 'TRENDING_UP' ||
    b.phase === 'TRENDING_DOWN' ||
    b.probability >= 40
  );

  document.getElementById('breakoutColCount').textContent = activeBreakouts.length;

  if (activeBreakouts.length === 0) {
    const emptyHTML = '<div class="empty-state"><div class="icon" style="font-size:28px;opacity:0.2">&#9651;</div><div class="msg mono" style="font-size:12px">No active breakouts detected<br><span style="color:var(--text-muted);font-size:10px">' + consolCount + ' stocks consolidating â watching for signals</span></div></div>';
    if (lastBreakoutsHTML !== emptyHTML) {
      body.innerHTML = emptyHTML;
      lastBreakoutsHTML = emptyHTML;
    }
    return;
  }

  // Sort: breakouts first, then trending, then by probability
  const phaseOrder = { 'BREAKOUT_UP': 0, 'BREAKOUT_DOWN': 0, 'TRENDING_UP': 1, 'TRENDING_DOWN': 1, 'CONSOLIDATION': 2, 'BUILDING_DATA': 3 };
  activeBreakouts.sort((a, b) => (phaseOrder[a.phase] ?? 2) - (phaseOrder[b.phase] ?? 2) || b.probability - a.probability);

  const newHTML = activeBreakouts.map(b => {
    const sentimentClass = b.isBullish ? 'bullish' : (b.phase === 'CONSOLIDATION' || b.phase === 'BUILDING_DATA') ? 'neutral' : 'bearish';
    const probClass = b.probability >= 70 ? 'prob-high' : b.probability >= 45 ? 'prob-mid' : 'prob-low';

    const signals = b.signals || {};
    const signalChips = Object.entries(signals).map(([key, val]) => {
      const isBull = typeof val === 'string' && (val.includes('bullish') || val === 'up' || val.startsWith('spike'));
      const isBear = typeof val === 'string' && (val.includes('bearish') || val === 'down');
      const chipClass = isBull ? 'active-bull' : isBear ? 'active-bear' : '';
      return `<span class="mono signal-chip ${chipClass}">${key.toUpperCase()}: ${val}</span>`;
    }).join('');

    return `
      <div class="breakout-card ${sentimentClass}" data-ticker="${b.ticker}">
        <div class="breakout-top">
          <div>
            <span class="sentiment-pill ${sentimentClass}"></span>
            <span class="mono ticker-name">${b.ticker}</span>
          </div>
          <span class="mono prob-badge ${probClass}">${b.probability}%</span>
        </div>
        <div class="trend-text">${b.trend || 'Analyzing...'}</div>
        ${signalChips ? `<div class="signal-row">${signalChips}</div>` : ''}
      </div>
    `;
  }).join('');

  // Only update DOM if content changed (prevents flashing)
  if (newHTML !== lastBreakoutsHTML) {
    body.innerHTML = newHTML;
    lastBreakoutsHTML = newHTML;
  }
}

// ============================================================================
// WATCHLIST MANAGEMENT
// ============================================================================
async function loadWatchlist() {
  try {
    const res = await fetch(`${API_BASE}/api/watchlist`);
    const data = await res.json();
    renderWatchlist(data.watchlist);
  } catch (err) {
    console.error('Watchlist load error:', err);
  }
}

function renderWatchlist(list) {
  document.getElementById('wlCount').textContent = list.length;
  document.getElementById('watchlistGrid').innerHTML = list.map(ticker => `
    <div class="watchlist-item">
      <span class="mono wl-ticker">${ticker}</span>
      <button class="remove-btn" onclick="removeTicker('${ticker}')" title="Remove ${ticker}">&times;</button>
    </div>
  `).join('');
}

async function addTicker() {
  const input = document.getElementById('addTickerInput');
  const ticker = input.value.trim().toUpperCase();
  if (!ticker) return;

  try {
    const res = await fetch(`${API_BASE}/api/watchlist/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker }),
    });
    const data = await res.json();
    if (data.watchlist) renderWatchlist(data.watchlist);
    input.value = '';
  } catch (err) {
    console.error('Add ticker error:', err);
  }
}

async function removeTicker(ticker) {
  try {
    const res = await fetch(`${API_BASE}/api/watchlist/remove`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker }),
    });
    const data = await res.json();
    if (data.watchlist) renderWatchlist(data.watchlist);
  } catch (err) {
    console.error('Remove ticker error:', err);
  }
}

// Enter key to add ticker
document.getElementById('addTickerInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addTicker();
});

// CLOCK
// ============================================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

setInterval(updateClock, 1000);
updateClock();

setInterval(fetchTerminal, 4000);
